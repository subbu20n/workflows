name: Update GitHub Commit Status
description: Posts a commit status check to GitHub — mirrors utils.updateCommitStatus() from Jenkins shared library
inputs:
  token:
    description: GitHub token
    required: true
  context:
    description: Status context name shown as check label (e.g. unit-tests, sonar-scan)
    required: true
  state:
    description: success | failure | pending | error 
    required: true
  description:
    description: Short message shown in GitHub UI (max 140 chars)
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env: 
        TOKEN: ${{ inputs.token }}  
        STATE: ${{ inputs.state }}
        CONTEXT: ${{ inputs.context }}
        DESCRIPTION: ${{ inputs.description }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
      run: |
        curl -sf \
          -X POST \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          -d "{\"state\":\"$STATE\",\"context\":\"$CONTEXT\",\"description\":\"$DESCRIPTION\"}" \
          "https://api.github.com/repos/$REPO/statuses/$SHA"